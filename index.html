<!DOCTYPE html>
<html>

<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>LEGA-Z Inventory</title>
<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body{
background:#0f172a;
color:white;
font-family:Arial;
text-align:center;
padding:20px;
}

.gold{
background:linear-gradient(90deg,#d4af37,#ffd700,#b8962e);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
font-weight:bold;
}

#titleMain{
font-size:48px;
letter-spacing:3px;
}

#titleSub{
font-size:18px;
font-weight:bold;
margin-bottom:20px;
}

.smallGold{
font-size:14px;
margin-top:5px;
}

.container{
max-width:420px;
margin:auto;
}

.row{
display:flex;
gap:10px;
}

select,input,button{
padding:10px;
margin:5px;
border-radius:6px;
border:none;
width:100%;
}

button{
background:#06b6d4;
color:white;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#0891b2;
}

#reader{
width:300px;
margin:auto;
}

table{
border-collapse:collapse;
width:100%;
margin-top:10px;
}

th,td{
border:1px solid #334155;
padding:6px;
}

input.qty{
width:70px;
text-align:center;
}

.spinner{
border:4px solid #ccc;
border-top:4px solid #06b6d4;
border-radius:50%;
width:30px;
height:30px;
animation:spin 1s linear infinite;
margin:auto;
}

@keyframes spin{
0%{transform:rotate(0)}
100%{transform:rotate(360deg)}
}
</style>
</head>

<body>

<div id="loginPage" class="container">

<div id="titleMain" class="gold">LEGA - Z</div>
<div id="titleSub">SPGUG - LOD INVENTORY MONITORING SYSTEM</div>
<div class="gold smallGold">YURI</div>

<br>

<input id="username" placeholder="Username">
<input id="password" type="password" placeholder="Password">

<button onclick="login()">Sign In</button>

<div id="loginSpinner"></div>
<p id="loginMsg"></p>

</div>


<div id="scannerPage" class="container" style="display:none">

<div id="titleSub">SPGUG - LOD INVENTORY MONITORING SYSTEM</div>

<div class="row">

<div style="flex:1">
<label>IS</label>
<select id="isDropdown"></select>
</div>

<div style="flex:1">
<label>Transaction</label>
<select id="transaction">
<option>RECEIVED</option>
<option>ISSUED</option>
<option>TRANSFERRED</option>
<option>INVENTORY COUNT</option>
<option>RETURNED</option>
</select>
</div>

</div>

<label>Name</label>
<input id="nameInput">

<button id="startScanner">Start Scanning</button>
<button id="doneBtn" style="display:none">DONE</button>

<div id="reader"></div>

<div>Scanned: <span id="scanCount">0</span></div>
<p>Last Scan: <span id="scanned">None</span></p>


<div id="previewSection" style="display:none">

<table id="previewTable">
<thead>
<tr>
<th>Date</th>
<th>Item Number</th>
<th>Description</th>
<th>Quantity</th>
</tr>
</thead>
<tbody></tbody>
</table>

<button id="deleteBtn">DELETE</button>
<button id="backBtn">BACK</button>
<button id="confirmBtn">CONFIRM</button>

</div>


<div id="doneAfterConfirm" style="display:none">
<button id="finishBtn">DONE</button>
</div>

</div>


<script>

const WEBAPP_URL="https://script.google.com/macros/s/AKfycbwzZ3j9j2cf5r1VLIFkBv83zLVQJ6ozN2LTJI01KExrpgNjt8kBO67TD1-Y9PeqGEE/exec"

let scanner
let scanning=true
let currentUser=""
let sessionScans=[]
let selectedIndex=null

function beep(){
new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg").play()
}

async function login(){

loginSpinner.innerHTML='<div class="spinner"></div>'

const res=await fetch(WEBAPP_URL,{
method:"POST",
body:new URLSearchParams({
action:"login",
username:username.value,
password:password.value
})
})

const data=await res.json()

loginSpinner.innerHTML=""

if(data.status==="success"){

currentUser=username.value

loginPage.style.display="none"
scannerPage.style.display="block"

loadDropdowns()

}else{

loginMsg.innerText="Invalid login"

}

}

async function loadDropdowns(){

const res=await fetch(WEBAPP_URL,{
method:"POST",
body:new URLSearchParams({action:"getDropdowns"})
})

const data=await res.json()

data.isList.forEach(v=>{
let o=document.createElement("option")
o.text=v
isDropdown.add(o)
})

}

startScanner.onclick=function(){

startScanner.style.display="none"
doneBtn.style.display="inline-block"

scanner=new Html5Qrcode("reader")

scanner.start(
{facingMode:"environment"},
{fps:10,qrbox:250},
scanSuccess
)

}

function scanSuccess(text){

if(!scanning)return

scanning=false

beep()

scanned.innerText=text

const[itemNo,description]=text.split("|")

sessionScans.push({
date:new Date().toLocaleString(),
itemNo,
description,
qty:1
})

renderTable()

scanCount.innerText=sessionScans.length

setTimeout(()=>{scanning=true},1000)

}

function renderTable(){

const tbody=document.querySelector("#previewTable tbody")

tbody.innerHTML=""

sessionScans.forEach((s,i)=>{

const tr=document.createElement("tr")

tr.innerHTML=`
<td>${s.date}</td>
<td>${s.itemNo}</td>
<td>${s.description}</td>
<td><input class="qty" type="number" step="0.01" value="${s.qty}" onchange="sessionScans[${i}].qty=this.value"></td>
`

tr.onclick=()=>selectedIndex=i

tbody.appendChild(tr)

})

}

doneBtn.onclick=function(){

scanner.stop()

previewSection.style.display="block"

}

deleteBtn.onclick=function(){

if(selectedIndex==null)return

sessionScans.splice(selectedIndex,1)

renderTable()

scanCount.innerText=sessionScans.length

}

backBtn.onclick=function(){

previewSection.style.display="none"

scanner.start(
{facingMode:"environment"},
{fps:10,qrbox:250},
scanSuccess
)

}

confirmBtn.onclick=async function(){

for(const s of sessionScans){

await fetch(WEBAPP_URL,{
method:"POST",
body:new URLSearchParams({
action:"log",
is:isDropdown.value,
transaction:transaction.value,
name:nameInput.value,
itemNo:s.itemNo,
description:s.description,
qty:s.qty,
user:currentUser
})
})

}

confirmBtn.style.display="none"
backBtn.style.display="none"
deleteBtn.style.display="none"

doneAfterConfirm.style.display="block"

}

finishBtn.onclick=function(){

sessionScans=[]

renderTable()

scanCount.innerText=0

previewSection.style.display="none"

confirmBtn.style.display="inline-block"
backBtn.style.display="inline-block"
deleteBtn.style.display="inline-block"

doneAfterConfirm.style.display="none"

startScanner.style.display="inline-block"

}

</script>

</body>
</html>
