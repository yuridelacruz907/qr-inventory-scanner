<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Inventory QR Scanner</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body { font-family: Arial; text-align: center; padding: 20px; }
#reader { width: 300px; margin: auto; }
select, input, button { padding: 10px; margin: 5px; }
#confirmation { color: green; font-weight: bold; margin-top: 10px; }
#loading { display: none; font-size: 16px; margin: 10px; }
#previewTable { margin: 10px auto; border-collapse: collapse; width: 90%; }
#previewTable th, #previewTable td { border: 1px solid #ccc; padding: 6px; text-align: center; }
#previewTable tr.selected { background-color: #f99; }
</style>

</head>
<body>

<!-- LOGIN PAGE -->
<div id="loginPage">
  <h2>Login</h2>
  <input id="username" placeholder="Username"><br>
  <input id="password" type="password" placeholder="Password"><br>
  <button onclick="login()">Sign In</button>
  <p id="loginMsg"></p>
  <div id="loading">Loading...</div>
</div>

<!-- MAIN SCANNER PAGE -->
<div id="scannerPage" style="display:none">
  <h2>Property Inventory QR Scanner</h2>

  <label>IS:</label><br>
  <select id="isDropdown"></select><br>

  <label>Transaction:</label><br>
  <select id="transaction">
    <option>RECEIVED</option>
    <option>ISSUED</option>
    <option>TRANSFERRED</option>
    <option>INVENTORY COUNT</option>
    <option>RETURNED</option>
  </select><br>

  <label>Name:</label><br>
  <input id="nameDropdown" list="nameOptions">
  <datalist id="nameOptions"></datalist><br>

  <button id="startScanner">Start Scanning</button>
  <button id="doneScanning" style="display:none;">Done</button>

  <div id="reader"></div>

  <p>Last Scan: <span id="scanned">None</span></p>
  <p id="confirmation"></p>
  <div id="loadingScanner" style="display:none;">Processing...</div>

  <!-- Preview Table -->
  <table id="previewTable">
    <thead>
      <tr>
        <th>IS</th>
        <th>Transaction</th>
        <th>Name</th>
        <th>Item No.</th>
        <th>Description</th>
        <th>Delete</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <button id="backButton" style="display:none;">Back</button>
  <button id="confirmButton" style="display:none;">Confirm</button>

</div>

<script>
const WEBAPP_URL = "https://script.google.com/macros/s/AKfycbwzZ3j9j2cf5r1VLIFkBv83zLVQJ6ozN2LTJI01KExrpgNjt8kBO67TD1-Y9PeqGEE/exec";

let currentUser = "";
let suppliers = [];
let personnel = [];
let scannedItems = [];
let scanner;
let scanning = true;

// beep sound
function beep(){
  const audio = new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg");
  audio.play();
}

// LOGIN
async function login() {
  const username = document.getElementById("username").value;
  const password = document.getElementById("password").value;

  document.getElementById("loading").style.display = "inline";

  try {
    const res = await fetch(WEBAPP_URL, {
      method: "POST",
      body: new URLSearchParams({ action: "login", username, password })
    });
    const data = await res.json();
    document.getElementById("loading").style.display = "none";

    if (data.status === "success") {
      currentUser = username;
      document.getElementById("loginPage").style.display = "none";
      document.getElementById("scannerPage").style.display = "block";
      loadDropdowns();
    } else {
      document.getElementById("loginMsg").innerText = "Invalid login";
    }
  } catch (err) {
    document.getElementById("loading").style.display = "none";
    document.getElementById("loginMsg").innerText = "Connection error";
  }
}

// LOAD DROPDOWNS
async function loadDropdowns() {
  document.getElementById("loading").style.display = "inline";
  const res = await fetch(WEBAPP_URL, {
    method: "POST",
    body: new URLSearchParams({ action: "getDropdowns" })
  });
  const data = await res.json();
  document.getElementById("loading").style.display = "none";

  suppliers = data.suppliers;
  personnel = data.personnel;

  const isDrop = document.getElementById("isDropdown");
  data.isList.forEach(v => { let opt = document.createElement("option"); opt.text = v; isDrop.add(opt); });

  updateNames();
}

document.getElementById("transaction").addEventListener("change", updateNames);

function updateNames() {
  const transaction = document.getElementById("transaction").value;
  const nameInput = document.getElementById("nameDropdown");
  const dataList = document.getElementById("nameOptions");

  let list = [];
  if (transaction === "RECEIVED") list = suppliers;
  else if (transaction === "ISSUED") list = personnel;

  dataList.innerHTML = "";
  list.forEach(v => {
    let opt = document.createElement("option");
    opt.value = v;
    dataList.appendChild(opt);
  });
}

// START SCANNER
document.getElementById("startScanner").addEventListener("click", () => {
  document.getElementById("startScanner").style.display = "none";
  document.getElementById("doneScanning").style.display = "inline";
  scanner = new Html5Qrcode("reader");
  scanner.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: 250 },
    scanSuccess
  ).catch(err => alert("Camera access denied or unavailable."));
});

// DONE BUTTON
document.getElementById("doneScanning").addEventListener("click", () => {
  scanner.stop();
  document.getElementById("doneScanning").style.display = "none";
  document.getElementById("backButton").style.display = "inline";
  document.getElementById("confirmButton").style.display = "inline";
  renderPreviewTable();
});

// BACK BUTTON
document.getElementById("backButton").addEventListener("click", () => {
  document.getElementById("backButton").style.display = "none";
  document.getElementById("confirmButton").style.display = "none";
  document.getElementById("startScanner").style.display = "inline";
});

// CONFIRM BUTTON
document.getElementById("confirmButton").addEventListener("click", async () => {
  document.getElementById("loadingScanner").style.display = "inline";

  for (let item of scannedItems) {
    await fetch(WEBAPP_URL, {
      method: "POST",
      body: new URLSearchParams({
        action: "log",
        is: item.is,
        transaction: item.transaction,
        name: item.name,
        itemNo: item.itemNo,
        description: item.description,
        user: currentUser
      })
    });
  }

  document.getElementById("loadingScanner").style.display = "none";
  document.getElementById("confirmation").innerText = `✅ ${scannedItems.length} items logged!`;
  scannedItems = [];
  document.getElementById("previewTable").querySelector("tbody").innerHTML = "";
  document.getElementById("backButton").style.display = "none";
  document.getElementById("confirmButton").style.display = "none";
  document.getElementById("startScanner").style.display = "inline";
});

// SCAN SUCCESS
async function scanSuccess(decodedText) {
  if (!scanning) return;
  scanning = false;
  beep();

  const [itemNo, description] = decodedText.split("|");
  const scannedObj = {
    is: document.getElementById("isDropdown").value,
    transaction: document.getElementById("transaction").value,
    name: document.getElementById("nameDropdown").value,
    itemNo,
    description
  };

  scannedItems.push(scannedObj);
  document.getElementById("scanned").innerText = decodedText;

  setTimeout(() => { scanning = true; }, 1000); // 1-second delay to avoid double scanning
}

// RENDER PREVIEW TABLE
function renderPreviewTable() {
  const tbody = document.getElementById("previewTable").querySelector("tbody");
  tbody.innerHTML = "";
  scannedItems.forEach((item, idx) => {
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td>${item.is}</td>
      <td>${item.transaction}</td>
      <td>${item.name}</td>
      <td>${item.itemNo}</td>
      <td>${item.description}</td>
      <td><button onclick="deleteRow(${idx})">Delete</button></td>
    `;
    tbody.appendChild(tr);
  });
}

// DELETE ROW
function deleteRow(index) {
  scannedItems.splice(index, 1);
  renderPreviewTable();
}
</script>

</body>
</html>
