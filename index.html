<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>LEGA-Z Inventory</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

body{
font-family:Arial;
background:#0f1117;
color:white;
text-align:center;
padding:20px;
}

.gold{
font-weight:bold;
font-size:40px;
background:linear-gradient(90deg,#c9a227,#ffd700,#c9a227);
-webkit-background-clip:text;
color:transparent;
}

.subtitle{
font-weight:bold;
font-size:20px;
}

.small{
font-size:12px;
color:#ccc;
}

input,select,button{
padding:10px;
margin:5px;
border-radius:6px;
border:none;
}

button{
background:#00c2ff;
color:black;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#00e1ff;
}

#reader{
width:300px;
margin:auto;
}

table{
width:95%;
margin:auto;
border-collapse:collapse;
}

th,td{
border:1px solid #444;
padding:6px;
}

.spinner{
border:4px solid #333;
border-top:4px solid #00c2ff;
border-radius:50%;
width:25px;
height:25px;
animation:spin 1s linear infinite;
display:inline-block;
}

@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

#suggestions{
border:1px solid #444;
max-height:150px;
overflow-y:auto;
background:#1a1d26;
}

.suggest-item{
padding:6px;
cursor:pointer;
}

.suggest-item:hover,
.suggest-active{
background:#00c2ff;
color:black;
}

</style>

</head>

<body>

<!-- LOGIN -->

<div id="loginPage">

<div class="gold">LEGA-Z</div>

<div class="subtitle">SPGUG - LOD INVENTORY MANAGEMENT SYSTEM</div>

<div class="small gold">YURI</div>

<br>

<input id="username" placeholder="Username"><br>

<input id="password" type="password" placeholder="Password"><br>

<button onclick="login()">SIGN IN</button>

<div id="loginSpin"></div>

</div>

<!-- MAIN -->

<div id="mainPage" style="display:none">

<h3 class="subtitle">SPGUG - LOD INVENTORY MANAGEMENT SYSTEM</h3>

<div>

<select id="isDropdown"></select>

<select id="transaction">
<option>RECEIVED</option>
<option>ISSUED</option>
<option>TRANSFERRED</option>
<option>INVENTORY COUNT</option>
<option>RETURNED</option>
</select>

</div>

<input id="nameInput" placeholder="Type name">

<div id="suggestions"></div>

<br>

<button id="startBtn">START SCANNING</button>

<button id="doneBtn" style="display:none">DONE</button>

<div id="reader"></div>

<h4>Scans: <span id="scanCount">0</span></h4>

<div id="preview" style="display:none">

<table>

<thead>

<tr>
<th>Date</th>
<th>Item</th>
<th>Description</th>
<th>Qty</th>
</tr>

</thead>

<tbody id="tableBody"></tbody>

</table>

<br>

<button id="deleteBtn">DELETE</button>
<button id="backBtn">BACK</button>
<button id="confirmBtn">CONFIRM</button>
<button id="finishBtn" style="display:none">DONE</button>

</div>

</div>

<script>

const API="https://script.google.com/macros/s/AKfycbwzZ3j9j2cf5r1VLIFkBv83zLVQJ6ozN2LTJI01KExrpgNjt8kBO67TD1-Y9PeqGEE/exec"

let suppliers=[]
let personnel=[]
let list=[]
let selectedIndex=-1
let session=[]
let currentUser=""
let scanner

// LOGIN

async function login(){

document.getElementById("loginSpin").innerHTML='<div class="spinner"></div>'

const username=username.value
const password=password.value

const res=await fetch(API,{
method:"POST",
body:new URLSearchParams({action:"login",username,password})
})

const data=await res.json()

document.getElementById("loginSpin").innerHTML=""

if(data.status==="success"){

currentUser=username

loginPage.style.display="none"
mainPage.style.display="block"

loadDropdowns()

}else{

alert("Invalid login")

}

}

// DROPDOWNS

async function loadDropdowns(){

const res=await fetch(API,{
method:"POST",
body:new URLSearchParams({action:"getDropdowns"})
})

const data=await res.json()

suppliers=data.suppliers
personnel=data.personnel

data.isList.forEach(i=>{
let o=document.createElement("option")
o.text=i
isDropdown.add(o)
})

updateList()

}

// LIST SWITCH

transaction.onchange=updateList

function updateList(){

if(transaction.value==="RECEIVED")
list=suppliers
else
list=personnel

}

// FUZZY SEARCH

function fuzzyMatch(str,pattern){

pattern=pattern.toLowerCase()

let i=0

for(let c of str.toLowerCase()){
if(c===pattern[i]) i++
}

return i===pattern.length

}

nameInput.addEventListener("input",()=>{

const v=nameInput.value

suggestions.innerHTML=""

if(!v) return

const results=list.filter(n=>fuzzyMatch(n,v)).slice(0,8)

results.forEach((r,i)=>{

const div=document.createElement("div")

div.className="suggest-item"

div.innerText=r

div.onclick=()=>{
nameInput.value=r
suggestions.innerHTML=""
}

suggestions.appendChild(div)

})

})

// SCANNER

startBtn.onclick=()=>{

startBtn.style.display="none"
doneBtn.style.display="inline"

scanner=new Html5Qrcode("reader")

scanner.start(
{facingMode:"environment"},
{fps:10,qrbox:250},
scanSuccess
)

}

// SCAN SUCCESS

function scanSuccess(text){

const [item,desc]=text.split("|")

const existing=session.find(s=>s.itemNo===item)

if(existing){

existing.qty++

}else{

session.push({
date:new Date().toLocaleString(),
itemNo:item,
description:desc,
qty:1
})

}

renderTable()

}

// TABLE

function renderTable(){

scanCount.innerText=session.length

tableBody.innerHTML=""

session.forEach((s,i)=>{

const tr=document.createElement("tr")

tr.innerHTML=

`<td>${s.date}</td>
<td>${s.itemNo}</td>
<td>${s.description}</td>
<td contenteditable="true">${s.qty}</td>`

tableBody.appendChild(tr)

})

}

// DONE

doneBtn.onclick=()=>{

scanner.stop()

preview.style.display="block"

}

// CONFIRM

confirmBtn.onclick=async()=>{

const payload=session.map(s=>({

is:isDropdown.value,
transaction:transaction.value,
name:nameInput.value,
itemNo:s.itemNo,
description:s.description,
qty:s.qty,
user:currentUser

}))

await fetch(API,{
method:"POST",
body:new URLSearchParams({
action:"logBatch",
items:JSON.stringify(payload)
})
})

confirmBtn.style.display="none"
finishBtn.style.display="inline"

}

// FINAL DONE

finishBtn.onclick=()=>{

session=[]

renderTable()

preview.style.display="none"

startBtn.style.display="inline"

}

</script>

</body>
</html>
