<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>QR Scanner with Add Button</title>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <script src="https://apis.google.com/js/api.js"></script>
</head>
<body>
  <h2>Property QR Scanner</h2>

  <label for="transaction">Transaction Type:</label>
  <select id="transaction">
    <option value="RECEIVED">RECEIVED</option>
    <option value="ISSUED" selected>ISSUED</option>
    <option value="TRANSFERRED">TRANSFERRED</option>
    <option value="INVENTORY COUNT">INVENTORY COUNT</option>
    <option value="RETURNED">RETURNED</option>
  </select>

  <div id="reader" style="width:300px;"></div>

  <p>Scanned QR: <span id="scanned">None</span></p>
  <button id="addBtn" disabled>Add to Google Sheet</button>

  <!-- Confirmation message -->
  <p id="confirmation" style="color:green; font-weight:bold;"></p>

  <script>
    let lastScanned = "";

    function initClient() {
      gapi.load('client:auth2', function() {
        gapi.auth2.init({
          client_id: 'YOUR_CLIENT_ID.apps.googleusercontent.com', // replace with your client ID
          scope: 'https://www.googleapis.com/auth/spreadsheets'
        });
      });
    }

    function signIn() {
      gapi.auth2.getAuthInstance().signIn().then(user => {
        console.log("Signed in as: " + user.getBasicProfile().getEmail());
      });
    }

    function onScanSuccess(decodedText, decodedResult) {
      lastScanned = decodedText;
      document.getElementById("scanned").textContent = decodedText;
      document.getElementById("addBtn").disabled = false; // enable Add button
      document.getElementById("confirmation").textContent = ""; // clear previous confirmation
    }

    document.getElementById("addBtn").addEventListener("click", () => {
      if (!lastScanned) return;

      const transaction = document.getElementById("transaction").value;
      const [itemNo, description] = lastScanned.split("|");
      const date = new Date().toISOString();

      gapi.client.sheets.spreadsheets.values.append({
        spreadsheetId: 'YOUR_SHEET_ID', // replace with your sheet ID
        range: 'TRANSACTION_LOG!A:D',
        valueInputOption: 'USER_ENTERED',
        resource: { values: [[date, itemNo, description, transaction]] }
      }).then(res => {
        console.log("Logged:", res);
        document.getElementById("confirmation").textContent = 
          `✅ Transaction encoded: ${itemNo} | ${description} [${transaction}]`;
        document.getElementById("addBtn").disabled = true;
        document.getElementById("scanned").textContent = "None";
        lastScanned = "";
      }).catch(err => {
        console.error(err);
        document.getElementById("confirmation").textContent = "❌ Failed to log transaction!";
      });
    });

    // Initialize QR scanner
    const html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: 250 }, false);
    html5QrcodeScanner.render(onScanSuccess);

    window.onload = initClient;
  </script>
</body>
</html>
