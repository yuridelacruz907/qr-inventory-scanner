<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>QR Scanner with Add Button</title>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <script src="https://apis.google.com/js/api.js"></script>
</head>
<body>
  <h2>Property QR Scanner</h2>

  <label for="transaction">Transaction Type:</label>
  <select id="transaction">
    <option value="RECEIVED">RECEIVED</option>
    <option value="ISSUED" selected>ISSUED</option>
    <option value="TRANSFERRED">TRANSFERRED</option>
    <option value="INVENTORY COUNT">INVENTORY COUNT</option>
    <option value="RETURNED">RETURNED</option>
  </select>

  <div id="reader" style="width:300px;"></div>

  <p>Scanned QR: <span id="scanned">None</span></p>
  <button id="addBtn" disabled>Add to Google Sheet</button>

  <p id="confirmation" style="color:green; font-weight:bold;"></p>

  <script>
    const CLIENT_ID = '408954433502-a0o27nhvbn9pla8vapplva0cp4irasmm.apps.googleusercontent.com';
    const API_KEY = 'AIzaSyDIP4uZl0kymt73zd2uDpqBee1JivmMsBY';
    const SHEET_ID = '12Nq5pKAlQkTmWOi_pjD0Tp2M6tEP-QXYlaEcEG2xciA';

    let lastScanned = "";
    let gapiInited = false;
    let isSignedIn = false;

    // Initialize gapi client
    function initClient() {
      gapi.load('client:auth2', async function() {
        await gapi.auth2.init({
          client_id: CLIENT_ID,
          scope: 'https://www.googleapis.com/auth/spreadsheets'
        });
        gapiInited = true;
        console.log("GAPI initialized");
      });
    }

    // Sign in user
    async function signIn() {
      if (!gapiInited) return alert("GAPI not initialized yet");
      const user = await gapi.auth2.getAuthInstance().signIn();
      isSignedIn = true;
      console.log("Signed in as:", user.getBasicProfile().getEmail());
      // Load Sheets API
      await gapi.client.init({
        apiKey: API_KEY,
        discoveryDocs: ["https://sheets.googleapis.com/$discovery/rest?version=v4"]
      });
      console.log("Sheets API loaded");
    }

    function onScanSuccess(decodedText, decodedResult) {
      lastScanned = decodedText;
      document.getElementById("scanned").textContent = decodedText;
      document.getElementById("addBtn").disabled = false;
      document.getElementById("confirmation").textContent = "";
    }

    document.getElementById("addBtn").addEventListener("click", async () => {
      if (!lastScanned) return;
      if (!isSignedIn) {
        await signIn();
      }

      const transaction = document.getElementById("transaction").value;
      const [itemNo, description] = lastScanned.split("|");
      const date = new Date().toISOString();

      try {
        await gapi.client.sheets.spreadsheets.values.append({
          spreadsheetId: SHEET_ID,
          range: 'TRANSACTION_LOG!A:D',
          valueInputOption: 'USER_ENTERED',
          resource: { values: [[date, itemNo, description, transaction]] }
        });

        document.getElementById("confirmation").textContent =
          `✅ Transaction encoded: ${itemNo} | ${description} [${transaction}]`;
        document.getElementById("addBtn").disabled = true;
        document.getElementById("scanned").textContent = "None";
        lastScanned = "";

      } catch (err) {
        console.error(err);
        document.getElementById("confirmation").textContent = "❌ Failed to log transaction!";
      }
    });

    // Initialize QR scanner
    const html5QrcodeScanner = new Html5QrcodeScanner(
      "reader",
      { fps: 10, qrbox: 250 },
      false
    );
    html5QrcodeScanner.render(onScanSuccess);

    window.onload = initClient;
  </script>
</body>
</html>
