<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body{background:#0f172a;color:white;font-family:Arial;text-align:center}
button{padding:10px;margin:5px;background:#06b6d4;color:white;border:none;border-radius:6px}
button:disabled{background:#555}
.whiteTable{background:white;color:black}
.spinner{border:4px solid #ccc;border-top:4px solid #06b6d4;border-radius:50%;width:30px;height:30px;animation:spin 1s linear infinite}
@keyframes spin{100%{transform:rotate(360deg)}}
</style>
</head>

<body>

<div id="login">
<h1>LEGA - Z</h1>
<input id="username">
<input id="password" type="password">
<button onclick="login()">Login</button>
<div id="spin"></div>
</div>

<div id="menu" style="display:none">
<button onclick="openModule('check')">CHECK ITEM</button>
<button onclick="openModule('inventory')">INVENTORY</button>
<button onclick="openModule('transaction')">TRANSACTIONS</button>
<button onclick="openModule('count')">PHYSICAL COUNT</button>
<button onclick="openModule('yearend')">YEAR-END</button>
</div>

<div id="main" style="display:none">
<select id="is"></select>
<select id="type" onchange="resetName()">
<option value="">SELECT TYPE</option>
<option>RECEIVED</option>
<option>ISSUED</option>
</select>

<input id="name">

<button id="start" disabled onclick="startScan()">START SCAN</button>
<div id="reader"></div>

<table id="table" class="whiteTable"></table>

<button id="confirm" onclick="confirm()" style="display:none">CONFIRM</button>
<button id="backOnly" onclick="resetAll()" style="display:none">BACK</button>
</div>

<script>
const URL="https://script.google.com/macros/s/AKfycbwzZ3j9j2cf5r1VLIFkBv83zLVQJ6ozN2LTJI01KExrpgNjt8kBO67TD1-Y9PeqGEE/exec";

let scans=[],scanner,isSubmitting=false;

function login(){
 spin.innerHTML='<div class="spinner"></div>';
 fetch(URL,{method:"POST",body:new URLSearchParams({action:"login",username:username.value,password:password.value})})
 .then(r=>r.json()).then(d=>{
 spin.innerHTML="";
 if(d.status==="success"){login.style.display="none";menu.style.display="block";}
 });
}

function openModule(m){
 menu.style.display="none";
 main.style.display="block";
}

function resetName(){ name.value=""; }

[name,is,type].forEach(el=>el.oninput=checkReady);

function checkReady(){
 start.disabled=!(is.value && type.value && name.value);
}

function startScan(){
 scanner=new Html5Qrcode("reader");
 scanner.start({facingMode:"environment"},{fps:10},onScan);
}

function onScan(txt){
 new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg").play();
 let [item,desc]=txt.split("|");
 let f=scans.find(s=>s.item==item);
 if(f)f.qty++; else scans.push({item,desc,qty:1});
 render();
}

function render(){
 table.innerHTML="<tr><th>Item</th><th>Description</th><th>Qty</th></tr>";
 scans.forEach(s=>{
 table.innerHTML+=`<tr><td>${s.item}</td><td>${s.desc}</td><td>${s.qty}</td></tr>`;
 });
 confirm.style.display="block";
}

async function confirm(){
 if(isSubmitting) return;
 isSubmitting=true;

 confirm.disabled=true;

 for(const s of scans){
  await fetch(URL,{
   method:"POST",
   body:new URLSearchParams({
    action:"log",
    is:is.value,
    transaction:type.value,
    name:name.value,
    itemNo:s.item,
    description:s.desc,
    quantity:s.qty
   })
  });
 }

 scans=[];

 confirm.style.display="none";
 backOnly.style.display="block";
 table.innerHTML="";
}

function resetAll(){
 main.style.display="none";
 menu.style.display="block";
 backOnly.style.display="none";
}
</script>

</body>
</html>
