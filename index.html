<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width,initial-scale=1">
<title>LEGA-Z</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
padding:20px;
}

.gold{
font-size:48px;
font-weight:bold;
background:linear-gradient(45deg,#c9a227,#ffd700,#c9a227);
-webkit-background-clip:text;
color:transparent;
}

.silver{
color:silver;
font-size:12px;
}

.spinner{
border:6px solid #1e293b;
border-top:6px solid #3b82f6;
border-radius:50%;
width:60px;
height:60px;
animation:spin 1s linear infinite;
margin:auto;
}

@keyframes spin{
0%{transform:rotate(0)}
100%{transform:rotate(360deg)}
}

button,input,select{
padding:10px;
margin:5px;
border-radius:6px;
border:none;
}

button{
background:#2563eb;
color:white;
cursor:pointer;
}

table{
border-collapse:collapse;
width:100%;
margin-top:10px;
}

th,td{
border:1px solid #334155;
padding:6px;
}

#reader{
width:300px;
margin:auto;
}

.success{
color:#22c55e;
font-weight:bold;
font-size:18px;
}

</style>

</head>

<body>

<div id="loginPage">

<div class="gold">LEGA-Z</div>

<b>SPGUG-LOD INVENTORY MANAGEMENT SYSTEM</b>

<div class="silver">by YURI</div>

<br>

<input id="username" placeholder="Username">
<input id="password" type="password" placeholder="Password">

<br>

<button onclick="login()">SIGN IN</button>

<div id="loginLoad"></div>

</div>


<div id="menuPage" style="display:none">

<h2>OPTIONS</h2>

<button onclick="openCheck()">CHECK ITEM</button>
<button onclick="openInventory()">INVENTORY</button>
<button onclick="openTransactions()">TRANSACTIONS</button>

</div>


<div id="checkPage" style="display:none">

<h3>CHECK ITEM</h3>

<div id="readerCheck"></div>

<p>Item: <span id="ciItem"></span></p>
<p>Description: <span id="ciDesc"></span></p>
<p>Available: <span id="ciQty"></span></p>

<button onclick="backMenu()">BACK</button>

</div>


<div id="inventoryPage" style="display:none">

<h3>INVENTORY</h3>

<div id="inventoryLoad" class="spinner"></div>

<table id="inventoryTable" style="display:none">

<thead>
<tr>
<th>Item</th>
<th>Description</th>
<th>Stock</th>
</tr>
</thead>

<tbody id="inventoryBody"></tbody>

</table>

<button onclick="backMenu()">BACK</button>

</div>


<div id="transactionPage" style="display:none">

<h3>TRANSACTIONS</h3>

<select id="isDropdown"></select>

<select id="transactionType">
<option>RECEIVED</option>
<option>ISSUED</option>
<option>TRANSFERRED</option>
<option>RETURNED</option>
<option>INVENTORY COUNT</option>
</select>

<input id="nameInput" placeholder="Name">

<button id="startBtn">START SCANNING</button>

<button onclick="backMenu()">BACK</button>

</div>


<div id="scannerPage" style="display:none">

<div id="reader"></div>

<button id="doneBtn">DONE</button>
<button id="scanBack">BACK</button>

<table>

<thead>
<tr>
<th>Date</th>
<th>Item</th>
<th>Description</th>
<th>Qty</th>
</tr>
</thead>

<tbody id="scanBody"></tbody>

</table>

</div>


<div id="confirmPage" style="display:none">

<p id="confirmMsg"></p>

<button onclick="backMenu()">BACK</button>

</div>


<script>

const WEBAPP_URL="https://script.google.com/macros/s/AKfycbwzZ3j9j2cf5r1VLIFkBv83zLVQJ6ozN2LTJI01KExrpgNjt8kBO67TD1-Y9PeqGEE/exec"

let scanner
let session=[]
let scanning=true
let currentUser=""

function beep(){
new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg").play()
}


async function login(){

loginLoad.innerHTML='<div class="spinner"></div>'

const res=await fetch(WEBAPP_URL,{
method:"POST",
body:new URLSearchParams({
action:"login",
username:username.value,
password:password.value
})
})

const data=await res.json()

loginLoad.innerHTML=""

if(data.status==="success"){

currentUser=username.value

loginPage.style.display="none"
menuPage.style.display="block"

loadDropdowns()

}

}


async function loadDropdowns(){

const res=await fetch(WEBAPP_URL,{
method:"POST",
body:new URLSearchParams({action:"getDropdowns"})
})

const data=await res.json()

data.isList.forEach(v=>{
let o=document.createElement("option")
o.text=v
isDropdown.add(o)
})

}


function openCheck(){
menuPage.style.display="none"
checkPage.style.display="block"
}


function openInventory(){
menuPage.style.display="none"
inventoryPage.style.display="block"
}


function openTransactions(){
menuPage.style.display="none"
transactionPage.style.display="block"
}


startBtn.onclick=function(){

transactionPage.style.display="none"
scannerPage.style.display="block"

scanner=new Html5Qrcode("reader")

scanner.start({facingMode:"environment"},{fps:10,qrbox:250},scanSuccess)

}


scanBack.onclick=function(){

scanner.stop()

scannerPage.style.display="none"
transactionPage.style.display="block"

}


function scanSuccess(text){

if(!scanning)return

scanning=false

beep()

const[itemNo,description]=text.split("|")

let found=session.find(s=>s.itemNo===itemNo)

if(found){
found.qty++
}else{
session.push({
date:new Date().toLocaleString(),
itemNo,
description,
qty:1
})
}

renderScan()

setTimeout(()=>scanning=true,1000)

}


function renderScan(){

scanBody.innerHTML=""

session.forEach(s=>{

let tr=document.createElement("tr")

tr.innerHTML=`
<td>${s.date}</td>
<td>${s.itemNo}</td>
<td>${s.description}</td>
<td>${s.qty}</td>
`

scanBody.appendChild(tr)

})

}


doneBtn.onclick=function(){

scanner.stop()

document.querySelectorAll("#scanBody td:last-child")
.forEach(td=>td.contentEditable=true)

let btn=document.createElement("button")
btn.innerText="CONFIRM"

btn.onclick=confirmLog

scannerPage.appendChild(btn)

}


async function confirmLog(){

const items=session.map(r=>({
is:isDropdown.value,
transaction:transactionType.value,
name:nameInput.value,
itemNo:r.itemNo,
description:r.description,
qty:r.qty,
user:currentUser
}))

const res=await fetch(WEBAPP_URL,{
method:"POST",
body:new URLSearchParams({
action:"logBatch",
items:JSON.stringify(items)
})
})

const data=await res.json()

scannerPage.style.display="none"

confirmPage.style.display="block"

confirmMsg.innerHTML=`<span class="success">✔ ${data.count} transactions successfully recorded</span>`

session=[]

}


function backMenu(){

menuPage.style.display="block"

checkPage.style.display="none"
inventoryPage.style.display="none"
transactionPage.style.display="none"
scannerPage.style.display="none"
confirmPage.style.display="none"

}

</script>

</body>
</html>
