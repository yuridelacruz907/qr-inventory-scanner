<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Inventory QR Scanner</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body {font-family:Arial;text-align:center;padding:20px}
#reader{width:300px;margin:auto}
select,input,button{padding:10px;margin:5px}
</style>

</head>

<body>

<!-- LOGIN PAGE -->

<div id="loginPage">

<h2>Login</h2>

<input id="username" placeholder="Username"><br>
<input id="password" type="password" placeholder="Password"><br>

<button onclick="login()">Sign In</button>

<p id="loginMsg"></p>

</div>


<!-- MAIN SCANNER PAGE -->

<div id="scannerPage" style="display:none">

<h2>Property Inventory QR Scanner</h2>

<label>IS:</label><br>
<select id="isDropdown"></select><br>

<label>Transaction:</label><br>
<select id="transaction">
<option>RECEIVED</option>
<option>ISSUED</option>
<option>TRANSFERRED</option>
<option>INVENTORY COUNT</option>
<option>RETURNED</option>
</select><br>

<label>Name:</label><br>
<select id="nameDropdown"></select><br>

<button id="startScanner">Start Scanner</button>

<div id="reader"></div>

<p>Last Scan: <span id="scanned">None</span></p>

<p id="confirmation"></p>

</div>


<script>

const WEBAPP_URL="https://script.google.com/macros/s/AKfycbwi0IkB2bEq1c6c1ToAWg1t1U7pcSKZrgTbn09Ioav41OVy_Qr_XpkLyvXRDYkzcU75/exec"

let currentUser=""
let suppliers=[]
let personnel=[]

function beep(){
  const audio=new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg")
  audio.play()
}

async function login(){

const username=document.getElementById("username").value
const password=document.getElementById("password").value

const res=await fetch(WEBAPP_URL,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
action:"login",
username,
password
})
})

const data=await res.json()

if(data.status=="success"){

currentUser=username

document.getElementById("loginPage").style.display="none"
document.getElementById("scannerPage").style.display="block"

loadDropdowns()

}
else{
document.getElementById("loginMsg").innerText="Invalid login"
}

}


async function loadDropdowns(){

const res=await fetch(WEBAPP_URL,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({action:"getDropdowns"})
})

const data=await res.json()

suppliers=data.suppliers
personnel=data.personnel

const isDrop=document.getElementById("isDropdown")
data.isList.forEach(v=>{
let opt=document.createElement("option")
opt.text=v
isDrop.add(opt)
})

updateNames()

}


document.getElementById("transaction").addEventListener("change",updateNames)

function updateNames(){

const transaction=document.getElementById("transaction").value
const nameDrop=document.getElementById("nameDropdown")

nameDrop.innerHTML=""

let list=[]

if(transaction=="RECEIVED"){
list=suppliers
}else if(transaction=="ISSUED"){
list=personnel
}

list.forEach(v=>{
let opt=document.createElement("option")
opt.text=v
nameDrop.add(opt)
})

}


let scanner
let scanning=true

document.getElementById("startScanner").addEventListener("click",()=>{

scanner=new Html5Qrcode("reader")

scanner.start(
{facingMode:"environment"},
{fps:10,qrbox:250},
scanSuccess
)

})


async function scanSuccess(decodedText){

if(!scanning)return

scanning=false

beep()

document.getElementById("scanned").innerText=decodedText

const [itemNo,description]=decodedText.split("|")

const payload={
action:"log",
is:document.getElementById("isDropdown").value,
transaction:document.getElementById("transaction").value,
name:document.getElementById("nameDropdown").value,
itemNo,
description,
user:currentUser
}

await fetch(WEBAPP_URL,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(payload)
})

document.getElementById("confirmation").innerText="Logged "+itemNo

setTimeout(()=>{
scanning=true
},1000)

}

</script>

</body>
</html>
