<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width,initial-scale=1">
<title>LEGA-Z</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
padding:20px;
}

.gold{
font-size:48px;
font-weight:bold;
background:linear-gradient(45deg,#c9a227,#ffd700,#c9a227);
-webkit-background-clip:text;
color:transparent;
}

.silver{
color:silver;
font-size:12px;
}

.spinner{
border:6px solid #1e293b;
border-top:6px solid #3b82f6;
border-radius:50%;
width:60px;
height:60px;
animation:spin 1s linear infinite;
margin:auto;
}

@keyframes spin{
0%{transform:rotate(0)}
100%{transform:rotate(360deg)}
}

button,input,select{
padding:10px;
margin:5px;
border-radius:6px;
border:none;
}

button{
background:#2563eb;
color:white;
cursor:pointer;
}

button:disabled{
background:#475569;
}

table{
border-collapse:collapse;
width:100%;
margin-top:10px;
}

th,td{
border:1px solid #334155;
padding:6px;
}

.selected{
background:#334155;
}

#reader{
width:300px;
margin:auto;
}

.greenMsg{
color:#22c55e;
font-weight:bold;
font-size:18px;
}

</style>

</head>

<body>

<!-- LOGIN -->

<div id="loginPage">

<div class="gold">LEGA-Z</div>

<b>SPGUG-LOD INVENTORY MANAGEMENT SYSTEM</b>

<div class="silver">by YURI</div>

<br>

<input id="username" placeholder="Username">
<input id="password" type="password" placeholder="Password">

<br>

<button onclick="login()">SIGN IN</button>

<div id="loginLoad"></div>

</div>


<!-- MENU -->

<div id="menuPage" style="display:none">

<h2>OPTIONS</h2>

<button onclick="openCheck()">CHECK ITEM</button>
<button onclick="openInventory()">INVENTORY</button>
<button onclick="openTransactions()">TRANSACTIONS</button>

</div>


<!-- CHECK ITEM -->

<div id="checkPage" style="display:none">

<h3>CHECK ITEM</h3>

<div id="readerCheck"></div>

<p>Item: <span id="ciItem"></span></p>
<p>Description: <span id="ciDesc"></span></p>
<p>Available: <span id="ciQty"></span></p>

<button onclick="backMenu()">BACK</button>

</div>


<!-- INVENTORY -->

<div id="inventoryPage" style="display:none">

<h3>INVENTORY</h3>

<div id="inventoryLoad" class="spinner"></div>

<table id="inventoryTable" style="display:none">

<thead>
<tr>
<th>Item</th>
<th>Description</th>
<th>Stock</th>
</tr>
</thead>

<tbody id="inventoryBody"></tbody>

</table>

<button onclick="backMenu()">BACK</button>

</div>


<!-- TRANSACTIONS -->

<div id="transactionPage" style="display:none">

<h3>TRANSACTIONS</h3>

<select id="isDropdown"></select>

<select id="transactionType">
<option value="">Transaction Type</option>
<option>RECEIVED</option>
<option>ISSUED</option>
<option>TRANSFERRED</option>
<option>RETURNED</option>
<option>INVENTORY COUNT</option>
</select>

<input id="nameInput" placeholder="Name">

<div id="nameSuggest"></div>

<br>

<button id="startBtn" disabled>START SCANNING</button>
<button onclick="backMenu()">BACK</button>

</div>


<!-- SCANNER -->

<div id="scannerPage" style="display:none">

<div id="reader"></div>

<br>

<button id="doneScan">DONE</button>
<button id="scanBack">BACK</button>

</div>


<!-- SUMMARY -->

<div id="summaryPage" style="display:none">

<h3>TRANSACTION SUMMARY</h3>

<table>

<thead>
<tr>
<th>Date</th>
<th>Item</th>
<th>Description</th>
<th>Qty</th>
</tr>
</thead>

<tbody id="summaryBody"></tbody>

</table>

<button id="deleteRow">DELETE</button>
<button id="summaryBack">BACK</button>
<button id="confirmBtn">CONFIRM</button>

<p id="successMsg"></p>

</div>


<script>

const WEBAPP_URL="https://script.google.com/macros/s/AKfycbwzZ3j9j2cf5r1VLIFkBv83zLVQJ6ozN2LTJI01KExrpgNjt8kBO67TD1-Y9PeqGEE/exec"

let suppliers=[]
let personnel=[]
let scanner
let session=[]
let scanning=true
let selectedRow=null
let currentUser=""

function beep(){
new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg").play()
}

function enableStart(){

if(isDropdown.value && transactionType.value && nameInput.value){
startBtn.disabled=false
}else{
startBtn.disabled=true
}

}

isDropdown.onchange=enableStart
transactionType.onchange=updateNames
nameInput.oninput=enableStart


async function login(){

loginLoad.innerHTML='<div class="spinner"></div>'

const res=await fetch(WEBAPP_URL,{
method:"POST",
body:new URLSearchParams({
action:"login",
username:username.value,
password:password.value
})
})

const data=await res.json()

loginLoad.innerHTML=""

if(data.status==="success"){

currentUser=username.value

loginPage.style.display="none"
menuPage.style.display="block"

loadDropdowns()

}else{
alert("Invalid Login")
}

}

async function loadDropdowns(){

const res=await fetch(WEBAPP_URL,{
method:"POST",
body:new URLSearchParams({action:"getDropdowns"})
})

const data=await res.json()

suppliers=data.suppliers
personnel=data.personnel

data.isList.forEach(v=>{
let o=document.createElement("option")
o.text=v
isDropdown.add(o)
})

}

function updateNames(){

let list=[]

if(transactionType.value==="RECEIVED") list=suppliers
if(transactionType.value==="ISSUED") list=personnel

nameSuggest.innerHTML=""

nameInput.oninput=function(){

let val=this.value.toLowerCase()

nameSuggest.innerHTML=""

list.filter(n=>n.toLowerCase().includes(val)).slice(0,8).forEach(n=>{

let d=document.createElement("div")

d.textContent=n

d.onclick=function(){
nameInput.value=n
nameSuggest.innerHTML=""
enableStart()
}

nameSuggest.appendChild(d)

})

}

}

function openTransactions(){

menuPage.style.display="none"
transactionPage.style.display="block"

}

startBtn.onclick=function(){

transactionPage.style.display="none"
scannerPage.style.display="block"

scanner=new Html5Qrcode("reader")

scanner.start({facingMode:"environment"},{fps:10,qrbox:250},scanSuccess)

}

scanBack.onclick=function(){

scanner.stop()

scannerPage.style.display="none"
transactionPage.style.display="block"

}

function scanSuccess(text){

if(!scanning)return

scanning=false

beep()

const[itemNo,description]=text.split("|")

let found=session.find(s=>s.itemNo===itemNo)

if(found){
found.qty++
}else{
session.push({
date:new Date().toLocaleString(),
itemNo,
description,
qty:1
})
}

setTimeout(()=>scanning=true,1000)

}

doneScan.onclick=function(){

scanner.stop()

scannerPage.style.display="none"

renderSummary()

summaryPage.style.display="block"

}

function renderSummary(){

summaryBody.innerHTML=""

session.forEach((s,i)=>{

let tr=document.createElement("tr")

tr.innerHTML=`
<td>${s.date}</td>
<td>${s.itemNo}</td>
<td>${s.description}</td>
<td contenteditable="true">${s.qty}</td>
`

tr.onclick=function(){

document.querySelectorAll("#summaryBody tr").forEach(r=>r.classList.remove("selected"))

tr.classList.add("selected")

selectedRow=i

}

summaryBody.appendChild(tr)

})

}

deleteRow.onclick=function(){

if(selectedRow===null)return

session.splice(selectedRow,1)

renderSummary()

}

summaryBack.onclick=function(){

summaryPage.style.display="none"
scannerPage.style.display="block"

scanner.start({facingMode:"environment"},{fps:10,qrbox:250},scanSuccess)

}

confirmBtn.onclick=async function(){

const res=await fetch(WEBAPP_URL,{
method:"POST",
body:new URLSearchParams({
action:"logBatch",
items:JSON.stringify(session.map(s=>({
is:isDropdown.value,
transaction:transactionType.value,
name:nameInput.value,
itemNo:s.itemNo,
description:s.description,
qty:s.qty,
user:currentUser
})))
})
})

const data=await res.json()

successMsg.innerHTML=`<span class="greenMsg">✔ ${data.count} transactions successfully recorded</span>`

session=[]

}

function backMenu(){

menuPage.style.display="block"
transactionPage.style.display="none"
scannerPage.style.display="none"
summaryPage.style.display="none"
checkPage.style.display="none"
inventoryPage.style.display="none"

}

</script>

</body>
</html>
