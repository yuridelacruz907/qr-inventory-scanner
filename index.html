<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>LEGA-Z</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
padding:20px;
}

.gold{
font-size:48px;
font-weight:bold;
background:linear-gradient(45deg,#c9a227,#ffd700,#c9a227);
-webkit-background-clip:text;
color:transparent;
}

.spinner{
border:6px solid #1e293b;
border-top:6px solid #ffd700;
border-radius:50%;
width:60px;
height:60px;
animation:spin 1s linear infinite;
margin:auto;
}

@keyframes spin{
0%{transform:rotate(0deg)}
100%{transform:rotate(360deg)}
}

button,input,select{
padding:10px;
margin:5px;
border-radius:6px;
border:none;
}

table{
border-collapse:collapse;
width:100%;
}

th,td{
border:1px solid #334155;
padding:6px;
}

#reader{
width:300px;
margin:auto;
}

.suggest{
background:#1e293b;
border:1px solid #334155;
max-height:150px;
overflow:auto;
}

.suggest div{
padding:5px;
cursor:pointer;
}

.suggest div:hover{
background:#334155;
}

</style>

</head>

<body>

<!-- LOGIN -->

<div id="loginPage">

<div class="gold">LEGA-Z</div>

<b>SPGUG - LOD INVENTORY MANAGEMENT SYSTEM</b>

<div style="color:#ffd700;font-size:12px">by YURI</div>

<br>

<input id="username" placeholder="Username">
<input id="password" type="password" placeholder="Password">

<br>

<button onclick="login()">SIGN IN</button>

<div id="loginLoad"></div>

</div>


<!-- MENU -->

<div id="menuPage" style="display:none">

<h2>SPGUG - LOD INVENTORY MANAGEMENT SYSTEM</h2>

<button onclick="openCheck()">CHECK ITEM</button>
<button onclick="openInventory()">INVENTORY</button>
<button onclick="openTransactions()">TRANSACTIONS</button>

</div>


<!-- CHECK ITEM -->

<div id="checkPage" style="display:none">

<h3>CHECK ITEM</h3>

<div id="readerCheck"></div>

<p>Item: <span id="ciItem"></span></p>
<p>Description: <span id="ciDesc"></span></p>
<p>Available: <span id="ciQty"></span></p>

<button onclick="backMenu()">BACK</button>

</div>


<!-- INVENTORY -->

<div id="inventoryPage" style="display:none">

<h3>INVENTORY</h3>

<div id="inventoryLoad" class="spinner"></div>

<table id="inventoryTable" style="display:none">

<thead>
<tr>
<th>Item</th>
<th>Description</th>
<th>Stock</th>
</tr>
</thead>

<tbody id="inventoryBody"></tbody>

</table>

<button onclick="backMenu()">BACK</button>

</div>


<!-- TRANSACTIONS -->

<div id="scannerPage" style="display:none">

<h3>TRANSACTIONS</h3>

<div style="display:flex;justify-content:space-between">

<select id="isDropdown"></select>

<select id="transaction">
<option>RECEIVED</option>
<option>ISSUED</option>
<option>TRANSFERRED</option>
<option>INVENTORY COUNT</option>
<option>RETURNED</option>
</select>

</div>

<input id="nameInput" placeholder="Name">

<div id="nameSuggest" class="suggest"></div>

<button id="startScanner">START SCANNING</button>
<button id="doneBtn">DONE</button>

<div id="reader"></div>

<p>Scans: <span id="scanCount">0</span></p>

<table>

<thead>
<tr>
<th>Date</th>
<th>Item</th>
<th>Description</th>
<th>Qty</th>
</tr>

</thead>

<tbody id="tableBody"></tbody>

</table>

<button id="deleteBtn">DELETE</button>
<button id="confirmBtn">CONFIRM</button>

<button onclick="backMenu()">BACK</button>

</div>


<script>

const WEBAPP_URL="https://script.google.com/macros/s/AKfycbwzZ3j9j2cf5r1VLIFkBv83zLVQJ6ozN2LTJI01KExrpgNjt8kBO67TD1-Y9PeqGEE/exec"

let suppliers=[]
let personnel=[]
let scanner
let session=[]
let scanning=true
let currentUser=""

function beep(){
new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg").play()
}

async function login(){

loginLoad.innerHTML='<div class="spinner"></div>'

const res=await fetch(WEBAPP_URL,{
method:"POST",
body:new URLSearchParams({
action:"login",
username:username.value,
password:password.value
})
})

const data=await res.json()

loginLoad.innerHTML=""

if(data.status==="success"){

currentUser=username.value

loginPage.style.display="none"
menuPage.style.display="block"

loadDropdowns()

}else{

alert("Invalid Login")

}

}

async function loadDropdowns(){

const res=await fetch(WEBAPP_URL,{
method:"POST",
body:new URLSearchParams({action:"getDropdowns"})
})

const data=await res.json()

suppliers=data.suppliers
personnel=data.personnel

data.isList.forEach(v=>{
let o=document.createElement("option")
o.text=v
isDropdown.add(o)
})

}

function backMenu(){

menuPage.style.display="block"
checkPage.style.display="none"
inventoryPage.style.display="none"
scannerPage.style.display="none"

}

function openCheck(){

menuPage.style.display="none"
checkPage.style.display="block"

const scan=new Html5Qrcode("readerCheck")

scan.start({facingMode:"environment"},{fps:10,qrbox:250},async(text)=>{

beep()

const[itemNo]=text.split("|")

const res=await fetch(WEBAPP_URL,{
method:"POST",
body:new URLSearchParams({
action:"checkItem",
itemNo
})
})

const data=await res.json()

ciItem.innerText=data.item
ciDesc.innerText=data.description
ciQty.innerText=data.qty

})

}

async function openInventory(){

menuPage.style.display="none"
inventoryPage.style.display="block"

inventoryLoad.style.display="block"
inventoryTable.style.display="none"

const res=await fetch(WEBAPP_URL,{
method:"POST",
body:new URLSearchParams({action:"inventory"})
})

const data=await res.json()

inventoryBody.innerHTML=""

for(let item in data){

let tr=document.createElement("tr")

tr.innerHTML=`
<td>${item}</td>
<td>${data[item].description}</td>
<td>${data[item].qty}</td>
`

inventoryBody.appendChild(tr)

}

inventoryLoad.style.display="none"
inventoryTable.style.display="table"

}

function openTransactions(){

menuPage.style.display="none"
scannerPage.style.display="block"

scanner=new Html5Qrcode("reader")

startScanner.onclick=function(){

scanner.start(
{facingMode:"environment"},
{fps:10,qrbox:250},
scanSuccess
)

}

doneBtn.onclick=function(){
scanner.stop()
}

}

function scanSuccess(text){

if(!scanning)return

scanning=false

beep()

const[itemNo,description]=text.split("|")

let found=session.find(s=>s.itemNo===itemNo)

if(found){

found.qty++

}else{

session.push({
date:new Date().toLocaleString(),
itemNo,
description,
qty:1
})

}

renderTable()

setTimeout(()=>{
scanning=true
},1000)

}

function renderTable(){

tableBody.innerHTML=""

session.forEach(s=>{

let tr=document.createElement("tr")

tr.innerHTML=`
<td>${s.date}</td>
<td>${s.itemNo}</td>
<td>${s.description}</td>
<td contenteditable="true">${s.qty}</td>
`

tableBody.appendChild(tr)

})

scanCount.innerText=session.length

}

confirmBtn.onclick=async function(){

await fetch(WEBAPP_URL,{
method:"POST",
body:new URLSearchParams({
action:"logBatch",
items:JSON.stringify(session.map(s=>({
is:isDropdown.value,
transaction:transaction.value,
name:nameInput.value,
itemNo:s.itemNo,
description:s.description,
qty:s.qty,
user:currentUser
})))
})
})

alert("Transactions Logged")

session=[]

renderTable()

}

</script>

</body>
</html>
