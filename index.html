<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Inventory QR Scanner</title>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    body { font-family: Arial; text-align:center; padding:20px; }
    #reader { width:300px; margin:auto; }
    button { padding:12px 20px; font-size:16px; margin-top:10px; }
    #confirmation { color:green; font-weight:bold; margin-top:10px; }
  </style>
</head>
<body>
<h2>Property Inventory QR Scanner</h2>

<label>Transaction Type:</label>
<select id="transaction">
  <option value="RECEIVED">RECEIVED</option>
  <option value="ISSUED" selected>ISSUED</option>
  <option value="TRANSFERRED">TRANSFERRED</option>
  <option value="INVENTORY COUNT">INVENTORY COUNT</option>
  <option value="RETURNED">RETURNED</option>
</select>

<p>
  <button id="startScanner">Start Scanner</button>
</p>

<div id="reader"></div>
<p>Scanned QR: <span id="scanned">None</span></p>
<button id="addBtn" disabled>Add to Google Sheet</button>
<p id="confirmation"></p>

<script>
const WEBAPP_URL = "https://script.google.com/macros/s/AKfycbwx-0WpkRT5ZOnZKdLb7L71Ls1bK92fsHwDUkTUrV0gotF7Wj9kc1yKGKX4jaIFQbLA/exec";
let lastScanned = "";
let scanner;

document.getElementById("startScanner").addEventListener("click", () => {
  scanner = new Html5Qrcode("reader");
  scanner.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: 250 },
    (decodedText) => {
      lastScanned = decodedText;
      document.getElementById("scanned").textContent = decodedText;
      document.getElementById("addBtn").disabled = false;
      document.getElementById("confirmation").textContent = "";
    },
    (errorMessage) => {
      // ignore scan errors
    }
  ).catch(err => alert("Camera access denied or unavailable."));
});

document.getElementById("addBtn").addEventListener("click", async () => {
  if (!lastScanned) return;

  const transaction = document.getElementById("transaction").value;
  const [itemNo, description] = lastScanned.split("|");

  try {
    const res = await fetch(WEBAPP_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ itemNo, description, transaction })
    });

    if (res.ok) {
      document.getElementById("confirmation").textContent =
        `✅ Transaction encoded: ${itemNo} | ${description} [${transaction}]`;
      document.getElementById("scanned").textContent = "None";
      document.getElementById("addBtn").disabled = true;
      lastScanned = "";
    } else {
      throw new Error("Failed to log transaction");
    }
  } catch (err) {
    console.error(err);
    document.getElementById("confirmation").textContent = "❌ Failed to log transaction!";
  }
});
</script>
</body>
</html>
