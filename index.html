<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width,initial-scale=1">

<title>LEGA-Z</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
padding:20px;
}

.gold{
font-size:50px;
font-weight:bold;
background:linear-gradient(45deg,#c9a227,#ffd700,#c9a227);
-webkit-background-clip:text;
color:transparent;
}

.subtitle{
font-weight:bold;
}

.small{
font-size:12px;
color:#ffd700;
}

button,input,select{
padding:10px;
margin:5px;
border-radius:6px;
border:none;
}

button{
background:#06b6d4;
color:white;
font-weight:bold;
cursor:pointer;
}

table{
border-collapse:collapse;
width:100%;
margin:auto;
}

th,td{
border:1px solid #334155;
padding:6px;
}

#reader{
width:300px;
margin:auto;
}

.selected{
background:#334155;
}

</style>

</head>

<body>

<div id="loginPage">

<div class="gold">LEGA-Z</div>

<div class="subtitle">SPGUG - LOD INVENTORY MANAGEMENT SYSTEM</div>

<div class="small">YURI</div>

<br>

<input id="username" placeholder="Username">

<input id="password" type="password" placeholder="Password">

<br>

<button onclick="login()">SIGN IN</button>

</div>


<div id="menuPage" style="display:none">

<h2>SPGUG - LOD INVENTORY MANAGEMENT SYSTEM</h2>

<button onclick="openCheck()">CHECK ITEM</button>

<button onclick="openInventory()">INVENTORY</button>

<button onclick="openTransactions()">TRANSACTIONS</button>

</div>



<div id="checkPage" style="display:none">

<h3>CHECK ITEM</h3>

<div id="readerCheck"></div>

<p>Item: <span id="ciItem"></span></p>

<p>Description: <span id="ciDesc"></span></p>

<p>Available: <span id="ciQty"></span></p>

<button onclick="backMenu()">BACK</button>

</div>



<div id="inventoryPage" style="display:none">

<h3>INVENTORY</h3>

<table>

<thead>
<tr>
<th>Item</th>
<th>Description</th>
<th>Stock</th>
</tr>
</thead>

<tbody id="inventoryBody"></tbody>

</table>

<button onclick="backMenu()">BACK</button>

</div>



<div id="scannerPage" style="display:none">

<h3>TRANSACTIONS</h3>

<select id="transaction">
<option>RECEIVED</option>
<option>ISSUED</option>
<option>TRANSFERRED</option>
<option>INVENTORY COUNT</option>
<option>RETURNED</option>
</select>

<br>

<button id="startScanner">START SCANNING</button>
<button id="doneBtn">DONE</button>

<div id="reader"></div>

<p>Scans: <span id="scanCount">0</span></p>

<table>

<thead>
<tr>
<th>Date</th>
<th>Item</th>
<th>Description</th>
<th>Qty</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>

</table>

<button id="deleteBtn">DELETE</button>
<button id="confirmBtn">CONFIRM</button>

<button onclick="backMenu()">BACK</button>

</div>



<script>

const WEBAPP_URL="https://script.google.com/macros/s/AKfycbwzZ3j9j2cf5r1VLIFkBv83zLVQJ6ozN2LTJI01KExrpgNjt8kBO67TD1-Y9PeqGEE/exec"

let scanner
let scanning=true
let session=[]
let selectedRow=null
let currentUser=""

function beep(){
new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg").play()
}


async function login(){

const res=await fetch(WEBAPP_URL,{
method:"POST",
body:new URLSearchParams({
action:"login",
username:username.value,
password:password.value
})
})

const data=await res.json()

if(data.status==="success"){

currentUser=username.value

loginPage.style.display="none"
menuPage.style.display="block"

}else{

alert("Invalid Login")

}

}


function backMenu(){

menuPage.style.display="block"
scannerPage.style.display="none"
inventoryPage.style.display="none"
checkPage.style.display="none"

}



function openCheck(){

menuPage.style.display="none"
checkPage.style.display="block"

const scan=new Html5Qrcode("readerCheck")

scan.start({facingMode:"environment"},{fps:10,qrbox:250},async(text)=>{

const[itemNo]=text.split("|")

const res=await fetch(WEBAPP_URL,{
method:"POST",
body:new URLSearchParams({
action:"checkItem",
itemNo
})
})

const data=await res.json()

ciItem.innerText=data.item
ciDesc.innerText=data.description
ciQty.innerText=data.qty

})

}



async function openInventory(){

menuPage.style.display="none"
inventoryPage.style.display="block"

const res=await fetch(WEBAPP_URL,{
method:"POST",
body:new URLSearchParams({
action:"inventory"
})
})

const data=await res.json()

inventoryBody.innerHTML=""

for(let item in data){

let tr=document.createElement("tr")

tr.innerHTML=`
<td>${item}</td>
<td>${data[item].description}</td>
<td>${data[item].qty}</td>
`

inventoryBody.appendChild(tr)

}

}



function openTransactions(){

menuPage.style.display="none"
scannerPage.style.display="block"

scanner=new Html5Qrcode("reader")

startScanner.onclick=function(){

scanner.start({facingMode:"environment"},{fps:10,qrbox:250},scanSuccess)

}

doneBtn.onclick=function(){

scanner.stop()

}

}



function scanSuccess(text){

if(!scanning)return

scanning=false

beep()

const[itemNo,description]=text.split("|")

let existing=session.find(s=>s.itemNo===itemNo)

if(existing){

existing.qty++

}else{

session.push({
date:new Date().toLocaleString(),
itemNo,
description,
qty:1
})

}

renderTable()

setTimeout(()=>{
scanning=true
},1000)

}



function renderTable(){

tableBody.innerHTML=""

session.forEach((s,i)=>{

let tr=document.createElement("tr")

tr.innerHTML=`
<td>${s.date}</td>
<td>${s.itemNo}</td>
<td>${s.description}</td>
<td contenteditable="true">${s.qty}</td>
`

tr.onclick=function(){

document.querySelectorAll("#tableBody tr").forEach(r=>r.classList.remove("selected"))

tr.classList.add("selected")

selectedRow=i

}

tableBody.appendChild(tr)

})

scanCount.innerText=session.length

}



deleteBtn.onclick=function(){

if(selectedRow===null)return

session.splice(selectedRow,1)

renderTable()

}



confirmBtn.onclick=async function(){

const payload=session.map(s=>({

is:"",
transaction:transaction.value,
name:"",
itemNo:s.itemNo,
description:s.description,
qty:s.qty,
user:currentUser

}))

await fetch(WEBAPP_URL,{
method:"POST",
body:new URLSearchParams({
action:"logBatch",
items:JSON.stringify(payload)
})
})

alert("Transactions Logged")

session=[]

renderTable()

}

</script>

</body>
</html>
