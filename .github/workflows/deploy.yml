name: Deploy Pages

on:
  push:
    branches:
      - main   # your default branch

permissions:
  contents: read
  pages: write
  id-token: write   # <--- THIS IS CRITICAL

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
